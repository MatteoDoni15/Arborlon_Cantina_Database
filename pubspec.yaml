name: cantina_vini
description: "Magazzino vini per ristoranti - offline-first, P2P sullo stesso WiFi."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Database locale (offline-first)
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4

  # Identificatori e date
  uuid: ^4.5.1
  intl: ^0.19.0

  # Foto
  image_picker: ^1.1.2

  # OCR etichetta (opzionale, leggibile dalla foto)
  google_mlkit_text_recognition: ^0.13.1

  # Backup / ripristino su file
  share_plus: ^10.0.2
  file_picker: ^8.1.2
  archive: ^3.6.1

  # Sync P2P sullo stesso WiFi
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  http: ^1.2.2
  network_info_plus: ^6.1.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Cloud (Fase 2, premium): sync a distanza via Supabase.
  # È un trasporto AGGIUNTIVO: il P2P locale resta sempre attivo.
  supabase_flutter: ^2.8.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0

  # Genera l'icona dell'app (launcher) da assets/Logo_cantina_vini.png.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/Logo_cantina_vini.png

# Configurazione dell'icona dell'app. Per generarla:
#   flutter pub get
#   dart run flutter_launcher_icons
# (da rifare se cambi il logo). Richiede che esistano le cartelle android/ios,
# quindi va lanciato DOPO "flutter create .".
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Logo_cantina_vini.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  # Icona adattiva Android (sfondo + logo in primo piano):
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/Logo_cantina_vini.png"
